<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430">
  <defs>
    <style>
      .bg { fill: #0b1020; }
      .taskbar { fill: #1b2335; stroke: #65738d; stroke-width: 2; }
      .cover { fill: #e85d75; stroke: #ffd0d8; stroke-width: 2; }
      .lyrics { fill: #58c4a7; stroke: #c9fff0; stroke-width: 2; }
      .label { fill: #eef4ff; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; font-size: 18px; }
      .small { fill: #c6d1e5; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; font-size: 15px; }
      .num { fill: #ffffff; font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif; font-size: 14px; font-weight: 700; }
      .line { stroke: #d8e4ff; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .tick { stroke: #d8e4ff; stroke-width: 2; }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 z" fill="#d8e4ff" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="430" />
  <text class="label" x="60" y="48">歌词布局三层示意图（逻辑像素 / DIP）</text>

  <!-- Scale: 2 drawing px = 1 DIP. Default lyric window: 420 x 40 DIP -> 840 x 80 drawing px. -->
  <g transform="translate(130,120)">
    <rect class="taskbar" x="0" y="0" width="840" height="80" rx="10" />
    <text class="small" x="16" y="28">任务栏 / 歌词窗口范围：420 x 40</text>

    <!-- Current layout: left edge to cover = 10 DIP, cover = 36 DIP, cover to lyric text = 10 DIP. -->
    <rect class="cover" x="20" y="4" width="72" height="72" rx="14" />
    <rect class="lyrics" x="112" y="10" width="700" height="60" rx="6" />

    <rect x="130" y="23" width="500" height="18" rx="3" fill="#e9fff9" opacity="0.95" />
    <rect x="130" y="47" width="360" height="14" rx="3" fill="#e9fff9" opacity="0.58" />

    <text class="small" x="20" y="118">封面层：36 x 36</text>
    <text class="small" x="112" y="118">歌词层：文字起点距窗口左侧 56</text>

    <!-- 10 DIP from taskbar/window left to cover. -->
    <line class="tick" x1="0" y1="-8" x2="0" y2="-24" />
    <line class="tick" x1="20" y1="-8" x2="20" y2="-24" />
    <line class="line" x1="0" y1="-24" x2="20" y2="-24" />
    <text class="num" x="4" y="-34">10</text>

    <!-- 36 DIP cover. -->
    <line class="tick" x1="20" y1="86" x2="20" y2="104" />
    <line class="tick" x1="92" y1="86" x2="92" y2="104" />
    <line class="line" x1="20" y1="104" x2="92" y2="104" />
    <text class="num" x="44" y="126">36</text>

    <!-- 10 DIP from cover to lyric text. -->
    <line class="tick" x1="92" y1="-8" x2="92" y2="-24" />
    <line class="tick" x1="112" y1="-8" x2="112" y2="-24" />
    <line class="line" x1="92" y1="-24" x2="112" y2="-24" />
    <text class="num" x="97" y="-34">10</text>

    <!-- 40 DIP taskbar/window height. -->
    <line class="tick" x1="850" y1="0" x2="870" y2="0" />
    <line class="tick" x1="850" y1="80" x2="870" y2="80" />
    <line class="line" x1="870" y1="0" x2="870" y2="80" />
    <text class="num" x="884" y="44">40</text>
  </g>

  <g transform="translate(110,305)">
    <rect class="taskbar" x="0" y="0" width="30" height="20" rx="4" />
    <text class="small" x="42" y="16">任务栏 / 歌词窗口范围</text>
    <rect class="cover" x="300" y="0" width="30" height="20" rx="4" />
    <text class="small" x="342" y="16">封面</text>
    <rect class="lyrics" x="455" y="0" width="30" height="20" rx="4" />
    <text class="small" x="497" y="16">歌词</text>
  </g>

  <text class="small" x="110" y="380">关键数值：左边缘到封面 10px；封面宽 36px；封面到歌词 10px；任务栏/窗口高度 40px。</text>
</svg>

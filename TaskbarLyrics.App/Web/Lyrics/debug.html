<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskbarLyrics Animation Debug</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 18% 12%, rgba(56, 189, 248, 0.22), transparent 28%),
        radial-gradient(circle at 76% 70%, rgba(168, 85, 247, 0.18), transparent 30%),
        #0b1220;
    }

    body {
      display: grid;
      place-items: center;
      gap: 18px;
      padding: 24px;
      overflow: auto;
      color: rgba(255, 255, 255, 0.92);
    }

    .debug-stage {
      width: 420px;
      height: 40px;
      border-radius: 8px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.76);
      box-shadow:
        0 18px 60px rgba(0, 0, 0, 0.36),
        0 0 0 1px rgba(148, 163, 184, 0.24) inset;
    }

    .debug-panel {
      width: 420px;
      display: grid;
      gap: 10px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 0 0 1px rgba(148, 163, 184, 0.22) inset;
      font: 12px/1.5 "Segoe UI", "Microsoft YaHei UI", sans-serif;
    }

    .debug-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .debug-actions button {
      border: 0;
      border-radius: 8px;
      padding: 7px 10px;
      color: white;
      background: #2563eb;
      font: inherit;
      cursor: pointer;
    }

    .debug-actions button.secondary {
      background: rgba(51, 65, 85, 0.9);
    }

    .debug-log {
      min-height: 54px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(2, 6, 23, 0.58);
      color: rgba(226, 232, 240, 0.86);
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <div id="debugStage" class="debug-stage">
    <div id="layout" class="layout">
      <div class="shell">
        <div id="cover" class="cover">
          <div id="coverFallback" class="cover-fallback">A</div>
          <img id="coverImage" class="cover-image" alt="" />
        </div>
        <div></div>
        <div class="lyrics-pane">
          <div id="viewport" class="viewport">
            <div id="track" class="track">
              <div id="currentLine" class="line current-line"><span id="currentLineText" class="line-text">TaskbarLyrics debug</span></div>
              <div id="nextLine" class="line next-line"><span id="nextLineText" class="line-text">等待自动场景...</span></div>
              <div id="incomingLine" class="line next-line incoming-line"><span id="incomingLineText" class="line-text"> </span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="debug-panel">
    <div>动画复现场景：切歌后先显示“正在检索歌词...”，再进入首屏歌词。</div>
    <div class="debug-actions">
      <button id="runNormal">正常切歌</button>
      <button id="runSameTimestamp">同时间戳开头</button>
      <button id="runRapid" class="secondary">快速连续切歌</button>
      <button id="clearLog" class="secondary">清空日志</button>
    </div>
    <div id="debugLog" class="debug-log"></div>
  </div>

  <script src="./app.js"></script>
  <script>
    const debugLog = document.getElementById("debugLog");
    const sleep = (ms) => new Promise((resolve) => window.setTimeout(resolve, ms));

    function log(message) {
      const now = new Date();
      const time = now.toTimeString().slice(0, 8) + "." + String(now.getMilliseconds()).padStart(3, "0");
      debugLog.textContent += `[${time}] ${message}\n`;
      debugLog.scrollTop = debugLog.scrollHeight;
    }

    function setCover(label, color) {
      window.taskbarLyrics.setCover("", label, color);
    }

    function setLyrics(current, next, progress, index, trackId) {
      log(`setLyrics track=${trackId} idx=${index} current=${current} next=${next}`);
      window.taskbarLyrics.setLyrics(current, next, progress, index, trackId);
    }

    async function runNormalSwitch() {
      const track = "debug|normal|" + Date.now();
      setCover("N", "#0ea5e9");
      setLyrics("正在检索歌词...", "", 0, -1, track);
      await sleep(120);
      setLyrics("第一句：风把夜色轻轻推开", "第二句：灯光落在窗边", 0, 0, track);
      await sleep(1300);
      setLyrics("第二句：灯光落在窗边", "第三句：旋律慢慢靠近", 0.1, 1, track);
    }

    async function runSameTimestampSwitch() {
      const track = "debug|same-timestamp|" + Date.now();
      setCover("S", "#22c55e");
      setLyrics("正在检索歌词...", "", 0, -1, track);
      await sleep(120);
      setLyrics("第一句：同时间戳 A", "第二句：同时间戳 B", 0, 0, track);
      await sleep(1300);
      setLyrics("第二句：同时间戳 B", "第三句：真正下一拍", 0, 1, track);
    }

    async function runRapidSwitch() {
      const first = "debug|rapid-a|" + Date.now();
      const second = "debug|rapid-b|" + Date.now();
      setCover("A", "#a855f7");
      setLyrics("正在检索歌词...", "", 0, -1, first);
      await sleep(160);
      setCover("B", "#f97316");
      setLyrics("正在检索歌词...", "", 0, -1, second);
      await sleep(120);
      setLyrics("第一句：第二首歌的开头", "第二句：不要提前抢位", 0, 0, second);
    }

    document.getElementById("runNormal").addEventListener("click", runNormalSwitch);
    document.getElementById("runSameTimestamp").addEventListener("click", runSameTimestampSwitch);
    document.getElementById("runRapid").addEventListener("click", runRapidSwitch);
    document.getElementById("clearLog").addEventListener("click", () => debugLog.textContent = "");

    window.debugLyrics = {
      runNormalSwitch,
      runSameTimestampSwitch,
      runRapidSwitch,
      snapshot() {
        return {
          current: document.getElementById("currentLineText").textContent,
          next: document.getElementById("nextLineText").textContent,
          incoming: document.getElementById("incomingLineText").textContent,
          trackTransform: document.getElementById("track").style.transform
        };
      }
    };
  </script>
</body>
</html>
